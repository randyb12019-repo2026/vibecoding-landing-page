name: Telegram Bot Polling

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore offset
        id: cache
        uses: actions/cache@v4
        with:
          path: offset.txt
          key: telegram-offset-v1
      - name: Run poll
        run: python3 scripts/bot_poll.py
      - name: Save offset
        uses: actions/cache@v4
        with:
          path: offset.txt
          key: telegram-offset-v1
